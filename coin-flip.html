<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flip the Coin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8b6914;
      --cream: #f5f0e8;
      --ink: #1a1410;
      --muted: #6b5a3e;
      --silver: #a8a8a8;
      --silver-light: #e0e0e0;
    }

    body {
      background-color: var(--ink);
      color: var(--cream);
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Decorative corner lines */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      opacity: 0.25;
    }
    .corner--tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 6px;
      line-height: 1;
    }

    .subline {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 52px;
    }

    /* ── COIN ── */
    .coin-scene {
      width: 200px;
      height: 200px;
      perspective: 800px;
      margin-bottom: 48px;
      cursor: pointer;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: none;
    }

    .coin.spinning {
      animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .coin.land-heads {
      animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 land-heads 0s 0.9s forwards;
    }

    .coin.land-tails {
      animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 land-tails 0s 0.9s forwards;
    }

    @keyframes spin {
      0%   { transform: rotateY(0deg) rotateX(15deg); }
      25%  { transform: rotateY(540deg) rotateX(15deg) translateY(-30px); }
      60%  { transform: rotateY(1080deg) rotateX(15deg) translateY(-10px); }
      100% { transform: rotateY(1440deg) rotateX(0deg); }
    }

    @keyframes land-heads {
      to { transform: rotateY(0deg); }
    }

    @keyframes land-tails {
      to { transform: rotateY(180deg); }
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      user-select: none;
    }

    /* HEADS face */
    .face--heads {
      background: radial-gradient(circle at 38% 38%, var(--gold-light) 0%, var(--gold) 45%, var(--gold-dark) 100%);
      box-shadow:
        inset -6px -6px 18px rgba(0,0,0,0.4),
        inset 4px 4px 12px rgba(255,255,255,0.2),
        0 8px 40px rgba(201,168,76,0.35),
        0 0 0 3px var(--gold-dark);
    }

    .face--tails {
      background: radial-gradient(circle at 38% 38%, #d8d8d8 0%, var(--silver) 45%, #666 100%);
      box-shadow:
        inset -6px -6px 18px rgba(0,0,0,0.4),
        inset 4px 4px 12px rgba(255,255,255,0.25),
        0 8px 40px rgba(168,168,168,0.2),
        0 0 0 3px #777;
      transform: rotateY(180deg);
    }

    .face__label {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .face--heads .face__label { color: var(--ink); }
    .face--tails .face__label { color: #1a1a1a; }

    .face__sub {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .face--heads .face__sub { color: rgba(26,20,16,0.6); }
    .face--tails .face__sub { color: rgba(0,0,0,0.45); }

    /* Rim effect */
    .coin-rim {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 6px solid transparent;
      background: transparent;
      pointer-events: none;
    }

    /* ── BUTTON ── */
    .flip-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 14px 44px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s, background 0.2s;
      outline: none;
    }

    .flip-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(201,168,76,0.2);
      pointer-events: none;
    }

    .flip-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.08);
      color: var(--gold-light);
    }

    .flip-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── RESULT ── */
    .result {
      margin-top: 32px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result__text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s 0.9s, transform 0.4s 0.9s;
    }

    .result__text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .result__text.heads { color: var(--gold-light); }
    .result__text.tails { color: var(--silver-light); }

    /* ── TALLY ── */
    .tally {
      margin-top: 40px;
      display: flex;
      gap: 48px;
      opacity: 0.6;
    }

    .tally__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tally__count {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .tally__item:first-child .tally__count { color: var(--gold); }
    .tally__item:last-child  .tally__count { color: var(--silver-light); }

    .tally__label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tally__divider {
      width: 1px;
      background: rgba(201,168,76,0.2);
      align-self: stretch;
    }

    /* ── HINT ── */
    .hint {
      position: fixed;
      bottom: 32px;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(107,90,62,0.5);
    }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">
    <h1 class="headline">Flip the Coin</h1>
    <p class="subline">fortune favours the bold</p>

    <div class="coin-scene" id="coinScene" title="Click to flip">
      <div class="coin" id="coin">
        <div class="face face--heads">
          <span class="face__label">H</span>
          <span class="face__sub">Heads</span>
        </div>
        <div class="face face--tails">
          <span class="face__label">T</span>
          <span class="face__sub">Tails</span>
        </div>
      </div>
    </div>

    <button class="flip-btn" id="flipBtn">— Flip —</button>

    <div class="result">
      <span class="result__text" id="resultText"></span>
    </div>

    <div class="tally">
      <div class="tally__item">
        <span class="tally__count" id="headsCount">0</span>
        <span class="tally__label">Heads</span>
      </div>
      <div class="tally__divider"></div>
      <div class="tally__item">
        <span class="tally__count" id="tailsCount">0</span>
        <span class="tally__label">Tails</span>
      </div>
    </div>
  </div>

  <p class="hint">press space or click to flip</p>

  <script>
    const coin      = document.getElementById('coin');
    const flipBtn   = document.getElementById('flipBtn');
    const resultTxt = document.getElementById('resultText');
    const headsEl   = document.getElementById('headsCount');
    const tailsEl   = document.getElementById('tailsCount');
    const scene     = document.getElementById('coinScene');

    let flipping = false;
    let counts   = { heads: 0, tails: 0 };

    function flip() {
      if (flipping) return;
      flipping = true;
      flipBtn.disabled = true;

      // Reset result text
      resultTxt.classList.remove('visible', 'heads', 'tails');

      // Determine outcome
      const isHeads = Math.random() < 0.5;

      // Remove previous animation classes
      coin.classList.remove('land-heads', 'land-tails', 'spinning');

      // Force reflow
      void coin.offsetWidth;

      // Apply animation
      coin.classList.add(isHeads ? 'land-heads' : 'land-tails');

      setTimeout(() => {
        const outcome = isHeads ? 'heads' : 'tails';
        counts[outcome]++;
        headsEl.textContent = counts.heads;
        tailsEl.textContent = counts.tails;

        resultTxt.textContent = isHeads ? 'Heads' : 'Tails';
        resultTxt.className = `result__text ${outcome} visible`;

        flipping = false;
        flipBtn.disabled = false;
      }, 900);
    }

    flipBtn.addEventListener('click', flip);
    scene.addEventListener('click', flip);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flip();
      }
    });
  </script>
</body>
</html>
